# csg-hub-server：挂载整个 NFS 根（静态 PV nfs-root-pv），可访问所有 PVC 子目录
# 部署前需先 apply nfs-root-pv.yaml、nfs-root-pvc.yaml（由 run-test-kind-nfs.sh 用 NFS_SERVER/NFS_PATH 替换后 apply）
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: nfs-demo-sandbox-csg-hub-server
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: nfs-demo
        app: csg-hub-server
    spec:
      # 与 shared-1/2 统一 UID/GID，保证挂载的 NFS 路径多 Pod 可互相读写（见 docs/plans/2026-03-17-nas-mount-permissions.md）
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
        - name: python-sandbox
          image: sandbox-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              # 挂载整个 NAS 根，/shared 下可见各 PVC 子目录（如 default-nfs-demo-pvc-<uid>/user-1/conv-1 等）
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: nfs-root-pvc
