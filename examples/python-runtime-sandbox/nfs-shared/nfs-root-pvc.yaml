# PVC 绑定到 NFS 根静态 PV，供 hub 等需要挂载「整个 NAS」的 Pod 使用
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nfs-root-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  storageClassName: ""
  resources:
    requests:
      storage: 10Gi
  volumeName: nfs-root-pv
