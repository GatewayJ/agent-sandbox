# 与 sandbox-shared-2 挂载同一路径：不设 subPath，两者都挂载 PVC 根目录到 /shared，可互相看到对方写入的文件
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: juicefs-demo-sandbox-user-1-conv-1
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: juicefs-demo
        user-id: "user-1"
        conv-id: "conv-1"
        juicefs/bucket: "juicefs"
        juicefs/pv-path: "juicefs-default-juicefs-demo-pvc"
    spec:
      containers:
        - name: python-sandbox
          image: sandbox-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              subPath: user-1/conv-1
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: juicefs-demo-pvc
