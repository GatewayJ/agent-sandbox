# 与 sandbox-shared-2 挂载同一路径：不设 subPath，两者都挂载 PVC 根目录到 /shared，可互相看到对方写入的文件
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: juicefs-demo-sandbox-user-1-conv-1
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: juicefs-demo
        user-id: "user-1"
        conv-id: "conv-1"
        juicefs/bucket: "juicefs"
        juicefs/pv-path: "juicefs-default-juicefs-demo-pvc"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
        - name: python-sandbox
          image: sandbox-runtime:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CSGHUB_USER_TOKEN
              value: ""
            - name: AIGATEWAY_BASE_URL
              value: ""
            - name: OPENCLAW_FORCE_DEFAULT_CONFIG
              value: "1"
          ports:
            - containerPort: 8888
            - containerPort: 18789
          volumeMounts:
            - name: shared-data
              mountPath: /home/node/.openclaw
              subPath: user-1/conv-1/.openclaw
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: juicefs-demo-pvc
