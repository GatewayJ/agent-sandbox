# JuiceFS CSI Secret: metadata in Redis, object storage in MinIO
# Must be in kube-system for CSI driver; bucket URL points to MinIO service in juicefs-infra
# Ref: https://juicefs.com/docs/zh/community/juicefs_on_k3s
apiVersion: v1
kind: Secret
metadata:
  name: juicefs-sc-secret
  namespace: kube-system
type: Opaque
stringData:
  name: "jfs-shared"
  metaurl: "redis://redis.juicefs-infra.svc.cluster.local:6379/0"
  storage: "minio"
  bucket: "http://minio.juicefs-infra.svc.cluster.local:9000/juicefs"
  access-key: "minioadmin"
  secret-key: "minioadmin"
