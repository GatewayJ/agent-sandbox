# csg-hub-server：挂载 JuiceFS 卷根（父级），使用静态 PV juicefs-root-pv，可访问所有 PVC 子目录
# 部署前需先 apply juicefs-root-pv.yaml 与 juicefs-root-pvc.yaml
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: juicefs-demo-sandbox-csg-hub-server
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: juicefs-demo
        app: csg-hub-server
        juicefs/bucket: "juicefs"
        juicefs/pv-path: "juicefs-root"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
        - name: python-sandbox
          image: sandbox-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              # 静态 PV 挂载整个 JuiceFS 卷根，/shared 下可见如 juicefs-default-juicefs-demo-pvc 等子目录
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: juicefs-root-pvc
