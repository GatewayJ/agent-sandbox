# csg-hub-server：挂载 JuiceFS 根目录（不设 subPath），可访问 PVC 下所有路径
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: juicefs-demo-sandbox-csg-hub-server
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox: juicefs-demo
        app: csg-hub-server
        juicefs/bucket: "juicefs"
        juicefs/pv-path: "juicefs-default-juicefs-demo-pvc"
    spec:
      containers:
        - name: python-sandbox
          image: sandbox-runtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          volumeMounts:
            - name: shared-data
              mountPath: /shared
              # 不设 subPath，挂载 PVC 根目录
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: juicefs-demo-pvc
