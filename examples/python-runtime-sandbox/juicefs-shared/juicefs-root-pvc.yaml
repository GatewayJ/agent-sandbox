# PVC 绑定到 JuiceFS 卷根静态 PV，供 hub 等需要访问「父级」目录的 Pod 使用
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: juicefs-root-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteMany
  volumeMode: Filesystem
  storageClassName: ""
  resources:
    requests:
      storage: 10Pi
  selector:
    matchLabels:
      juicefs-name: jfs-shared-root
